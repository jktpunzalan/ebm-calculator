<!doctype html>
<html lang="en" x-data="dashboard()">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard — saliksic.com</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ebm/assets/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/ebm/assets/js/admin.js"></script>
</head>
<body x-init="init()">
  <div class="admin-wrap">
    <aside class="sidebar">
      <div style="font-weight:800;color:#9ad9d1">saliksic.com Admin</div>
      <a href="/ebm/admin/index.html">Dashboard</a>
      <a href="/ebm/admin/publications.html">Publications</a>
      <a href="/ebm/admin/journal.html">Journal</a>
      <a href="/ebm/admin/professional.html">Professional</a>
      <a href="/ebm/admin/users.html">Users</a>
      <a href="#" @click.prevent="logout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Dashboard</h1>
      <div class="grid-2" style="margin:10px 0">
        <div class="card"><div class="label">Total Publications</div><div class="h-title" x-text="stats.total_publications"></div></div>
        <div class="card"><div class="label">Journal Articles</div><div class="h-title" x-text="stats.total_journal_articles"></div></div>
        <div class="card"><div class="label">Views (this month)</div><div class="h-title" x-text="stats.total_views_this_month"></div></div>
        <div class="card"><div class="label">Shares (this month)</div><div class="h-title" x-text="stats.total_shares_this_month"></div></div>
      </div>

      <h2 style="margin-top:12px">Recent publications</h2>
      <table class="table">
        <thead><tr><th>Slug</th><th>Title</th><th>Type</th><th>Views</th><th>Shares</th></tr></thead>
        <tbody>
          <template x-for="p in recent" :key="p.id">
            <tr>
              <td x-text="p.slug"></td>
              <td x-text="p.title"></td>
              <td x-text="p.study_type"></td>
              <td x-text="p.views||0"></td>
              <td x-text="p.shares||0"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>
  </div>

  <script>
    function dashboard(){
      return {
        stats:{ total_publications:0,total_journal_articles:0,total_views_this_month:0,total_shares_this_month:0 },
        recent:[],
        async init(){
          requireAuth();
          const s = await apiFetch('/admin/stats');
          if(s.ok) this.stats = s.json.data;
          const pubs = await apiFetch('/publications');
          if(pubs.ok) this.recent = (pubs.json.data||[]).slice(0,10);
        },
        async logout(){ clearToken(); location.href='/ebm/admin/login.html'; }
      }
    }
  </script>
</body>
</html>
