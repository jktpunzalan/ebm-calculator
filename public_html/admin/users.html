<!doctype html>
<html lang="en" x-data="usersAdmin()">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Users — saliksic.com</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ebm/assets/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/ebm/assets/js/admin.js"></script>
</head>
<body x-init="init()">
  <div class="admin-wrap">
    <aside class="sidebar">
      <div style="font-weight:800;color:#9ad9d1">saliksic.com Admin</div>
      <a href="/ebm/admin/index.html">Dashboard</a>
      <a href="/ebm/admin/publications.html">Publications</a>
      <a href="/ebm/admin/journal.html">Journal</a>
      <a href="/ebm/admin/professional.html">Professional</a>
      <a href="/ebm/admin/users.html">Users</a>
      <a href="#" @click.prevent="logout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Users</h1>
      <div class="alert" x-show="error" x-text="error"></div>
      <p class="alert">Role changes and deactivation are not yet implemented.</p>
      <table class="table">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th><th>Actions</th></tr></thead>
        <tbody>
          <template x-for="u in users" :key="u.id">
            <tr>
              <td x-text="u.name"></td>
              <td x-text="u.email"></td>
              <td><span class="badge" x-text="u.role||'clinician'"></span></td>
              <td><input type="checkbox" checked disabled></td>
              <td>
                <button class="btn outline" @click="alert('Not yet implemented')">Deactivate</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </main>
  </div>

  <script>
    function usersAdmin(){
      return {
        users:[], error:'',
        async init(){
          requireAuth();
          // No dedicated endpoint yet; show empty with placeholder
          this.users = [];
        },
        logout(){ clearToken(); location.href='/ebm/admin/login.html'; }
      }
    }
  </script>
</body>
</html>
