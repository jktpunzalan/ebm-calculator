<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal — saliksic.com</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ebm/assets/css/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="/ebm/">saliksic.com</a>
      <div class="menu">
        <a href="/ebm/publications/">Publications</a>
        <a href="/ebm/journal/">Journal</a>
        <a href="/ebm/professional/">Professional</a>
        <a href="/ebm/app/">EBM App</a>
      </div>
    </div>
  </nav>

  <main class="container" style="padding:20px 0">
    <h1>Journal</h1>
    <div id="journal-root" class="journal-list"></div>
  </main>

  <footer class="footer">
    <div class="container inner">© <span id="yr"></span> saliksic.com</div>
  </footer>

  <script src="/ebm/assets/js/main.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    async function loadJournal(){
      try{
        const res = await apiGet('/journal');
        const byYear = {};
        (res.data||[]).forEach(a=>{ const y=a.year||'Unknown'; (byYear[y]=byYear[y]||[]).push(a);});
        const root = document.getElementById('journal-root');
        root.innerHTML='';
        Object.keys(byYear).sort((a,b)=>b-a).forEach(y=>{
          const g = document.createElement('div'); g.className='year-group';
          g.innerHTML=`<div class="year-title">${y}</div>`;
          byYear[y].forEach(a=>{
            const item = document.createElement('div'); item.className='card';
            const doi = a.doi?`<a class="pub-link" target="_blank" href="https://doi.org/${a.doi}">DOI</a>`:'';
            const pdf = a.pdf_path?`<a class="pub-link" target="_blank" href="${a.pdf_path}">PDF</a>`:'';
            item.innerHTML = `
              <div style="font-weight:700">${a.title}</div>
              <div style="color:var(--muted);font-size:13px">${a.authors||''} • ${a.volume||''} ${a.issue?('('+a.issue+')'):''}</div>
              <div style="margin-top:6px;display:flex;gap:10px">${doi} ${pdf}</div>
            `;
            g.appendChild(item);
          });
          root.appendChild(g);
        });
      }catch(e){ console.error(e); }
    }
    loadJournal();
  </script>
</body>
</html>
